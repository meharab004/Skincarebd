<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skincarebd Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#FDFBF7;">

    <div class="admin-container">
        <h2>Skincarebd Admin Dashboard</h2>

        <div id="login-section">
            <div class="form-group"><input type="email" id="email" placeholder="Admin Email"></div>
            <div class="form-group"><input type="password" id="password" placeholder="Password"></div>
            <button class="btn" id="login-btn" style="width:100%;">Log In</button>
        </div>

        <div id="upload-section" class="hidden">
            <div class="form-group"><input type="text" id="p-name" placeholder="Product Name"></div>
            <div class="form-group">
                <select id="p-cat">
                    <option value="Facewash">Facewash</option>
                    <option value="Serum">Serum</option>
                    <option value="Moisturizer">Moisturizer</option>
                </select>
            </div>
            <div class="form-group"><input type="text" id="p-price" placeholder="Price (e.g. ৳ 1,200)"></div>
            
            <div class="form-group">
                <label style="font-size: 14px; color: #5A5A5A;">Product Image URL:</label>
                <input type="text" id="p-img-url" placeholder="Paste image link here">
                <p style="font-size: 12px; color: #888; margin-top: 5px;">Upload your photo to <a href="https://imgbb.com/" target="_blank" style="color: #B59B92;">ImgBB.com</a> and paste the direct link here.</p>
            </div>
            
            <button class="btn" id="upload-btn" style="width:100%;">Upload Product</button>
            <button class="btn" id="logout-btn" style="background:#888; border-color:#888; width:100%; margin-top:10px;">Log Out</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // Removed storage imports, only keeping Firestore database imports
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your specific Firebase Keys
        const firebaseConfig = {
            apiKey: "AIzaSyDaei_nCLLaDuYtAeSYqjGjVSlFpUUZmWc",
            authDomain: "skincarebd-86462.firebaseapp.com",
            projectId: "skincarebd-86462",
            storageBucket: "skincarebd-86462.firebasestorage.app",
            messagingSenderId: "324894116147",
            appId: "1:324894116147:web:c2c1bae02b0e267f92d646"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('login-btn').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .catch(err => alert("Error: " + err.message));
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('upload-section').classList.remove('hidden');
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('upload-section').classList.add('hidden');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        document.getElementById('upload-btn').addEventListener('click', async () => {
            const name = document.getElementById('p-name').value;
            const cat = document.getElementById('p-cat').value;
            const price = document.getElementById('p-price').value;
            const imgUrl = document.getElementById('p-img-url').value; // Grabbing the link instead of a file

            if(!name || !price || !imgUrl) return alert("Fill all fields and paste an image link!");
            document.getElementById('upload-btn').innerText = "Uploading...";

            try {
                // Saves text data and the image link straight to Firestore
                await addDoc(collection(db, "products"), { name, category: cat, price, image: imgUrl });
                alert("Product Added successfully!");
                location.reload();
            } catch (err) { 
                alert("Error: " + err.message); 
                document.getElementById('upload-btn').innerText = "Upload Product";
            }
        });
    </script>
</body>
</html>
